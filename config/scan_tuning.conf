# ============================================================
# NetRecon — Scan Tuning Configuration
# ============================================================
# Timing, rate limits, and behavioral settings.
# Adjust based on network sensitivity and bandwidth.
# ============================================================

# --- Nmap Timing Templates ---
# -T0 = Paranoid, -T1 = Sneaky, -T2 = Polite,
# -T3 = Normal, -T4 = Aggressive, -T5 = Insane
# For non-intrusive testing, NEVER use T4 or T5.
DEFAULT_TIMING="-T3"
REMOTE_TIMING="-T2"            # Use for high-latency / remote sites

# --- Rate Limits (packets per second) ---
DISCOVERY_RATE=300              # Host discovery scans
TCP_SCAN_RATE=500               # TCP port scans
UDP_SCAN_RATE=200               # UDP scans (must be slower)
VULN_SCAN_RATE=300              # Vuln check scans
NSE_SCAN_RATE=200               # NSE script scans

# --- Timeouts ---
SNMP_WALK_TIMEOUT=30            # Seconds per SNMP OID walk
SNMP_CHECK_TIMEOUT=60           # Seconds for snmp-check tool
SSH_AUDIT_TIMEOUT=30            # Seconds per ssh-audit host

# --- Traffic Capture (Phase 6) ---
CAPTURE_DURATION=600            # Seconds (default 10 minutes)
CAPTURE_PACKET_LIMIT=200000     # Max packets to capture
CAPTURE_INTERFACE="eth0"        # Default capture interface

# --- Behavior ---
PARALLEL_SITES=false            # Run sites in parallel (use with caution)
CONTINUE_ON_ERROR=true          # Continue orchestrator if a phase fails
PREFLIGHT_WAIT=5                # Seconds to wait after preflight before starting

# --- Scan Mode ---
# safe     = Non-intrusive only (default)
# aggressive = Includes exploits, brute force, full port scans
SCAN_MODE="${SCAN_MODE:-safe}"

# --- Aggressive Mode Overrides ---
# These only apply when SCAN_MODE=aggressive
AGGRESSIVE_TIMING="-T4"
AGGRESSIVE_TCP_RATE=2000
AGGRESSIVE_UDP_RATE=500
AGGRESSIVE_VULN_RATE=800
BRUTE_FORCE_THREADS=4           # Parallel brute-force threads per service
BRUTE_FORCE_TIMEOUT=300         # Seconds per brute target
BRUTE_FORCE_LIMIT=50            # Max credential pairs to try per service
